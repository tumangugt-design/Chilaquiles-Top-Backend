<!--
  CHILAQUILES TOP — Background / Texture Components
  ===================================================
  100% CSS — sin imágenes externas.
  Cada background es un div contenedor de 1080×1080px
  (o el tamaño del canvas). Todos los demás elementos
  (header, hero, footer) van dentro del .ct-bg como hijos.

  USO:
    <div class="ct-bg ct-bg--1">
      <!-- header, hero, footer aquí -->
    </div>
-->

<!-- ============================================================
     BACKGROUND 1 — "Dot Field" (Campo de puntos)
     Base: blanco / gris muy suave.
     Capa 1: grid de puntos lavanda (radial-gradient).
     Capa 2: glow azul difuso en esquina superior izquierda.
     Capa 3: glow naranja difuso en esquina inferior derecha.
     Sensación: limpio, moderno, ligero. Versátil.
     Combina con: Header 1, Header 2, Header 3. Footer 1, 3.
     ============================================================ -->
<style>
  .ct-bg--1 {
    position: relative;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: var(--ct-gris-bg);
    /* Dot grid */
    background-image: radial-gradient(var(--ct-lavanda) 2.2px, transparent 2.2px);
    background-size: 30px 30px;
  }
  .ct-bg--1::before {
    content: '';
    position: absolute;
    width: 680px;
    height: 680px;
    top: -160px;
    left: -160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,0,255,.13), rgba(0,0,255,0) 65%);
    pointer-events: none;
  }
  .ct-bg--1::after {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    bottom: -120px;
    right: -120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,0,.15), rgba(255,107,0,0) 65%);
    pointer-events: none;
  }
</style>
<div class="ct-bg ct-bg--1">
  <!-- CONTENIDO DE LA PIEZA AQUÍ -->
</div>


<!-- ============================================================
     BACKGROUND 2 — "Oscuro Premium"
     Base: azul muy oscuro (#04044A) casi negro azulado.
     Capa 1: glow central blanco/lavanda (spotlight).
     Capa 2: grid de líneas finas semitransparentes.
     Capa 3: glow naranja sutil en la esquina inferior.
     Sensación: premium, nocturno, aspiracional.
     Combina con: Header 1 (blanco), Footer 1 (azul) o Footer 2 (negro).
     ============================================================ -->
<style>
  .ct-bg--2 {
    position: relative;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #04044A;
    /* Grid de líneas sutiles */
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .ct-bg--2::before {
    content: '';
    position: absolute;
    width: 700px;
    height: 700px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -52%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(229,230,252,.10) 0%, rgba(229,230,252,0) 65%);
    pointer-events: none;
  }
  .ct-bg--2::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    bottom: -100px;
    right: -60px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,0,.18), rgba(255,107,0,0) 65%);
    pointer-events: none;
  }
  /* Elemento extra: orbe azul eléctrico izq */
  .ct-bg--2 .ct-bg--2__orb {
    position: absolute;
    width: 380px;
    height: 380px;
    top: 30px;
    left: -80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,0,255,.22), rgba(0,0,255,0) 65%);
    pointer-events: none;
  }
</style>
<div class="ct-bg ct-bg--2">
  <div class="ct-bg--2__orb"></div>
  <!-- CONTENIDO DE LA PIEZA AQUÍ -->
</div>


<!-- ============================================================
     BACKGROUND 3 — "Diagonal"
     Panel izquierdo: azul de marca (~38% del ancho).
     Panel derecho: blanco/gris muy suave.
     Corte: clip-path diagonal en el panel azul.
     Línea de acento: degradé naranja→azul a lo largo del corte.
     Sensación: dinámico, bicolor, muy reconocible.
     Combina con: Header 2 (Minimal) o Header 3. Footer 3 (blanco).
     Nota: el header y footer van sobre el fondo completo,
           el corte solo afecta el área del body/hero.
     ============================================================ -->
<style>
  .ct-bg--3 {
    position: relative;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: var(--ct-gris-bg);
  }
  /* Panel azul izquierdo con clip diagonal */
  .ct-bg--3__panel {
    position: absolute;
    inset: 0;
    background: var(--ct-azul);
    clip-path: polygon(0 0, 44% 0, 36% 100%, 0 100%);
  }
  /* Puntos decorativos sobre el panel azul */
  .ct-bg--3__dots {
    position: absolute;
    inset: 0;
    clip-path: polygon(0 0, 44% 0, 36% 100%, 0 100%);
    background-image: radial-gradient(rgba(255,255,255,.18) 2px, transparent 2px);
    background-size: 28px 28px;
  }
  /* Línea de acento diagonal naranja→azul */
  .ct-bg--3__accent {
    position: absolute;
    top: 0;
    left: calc(44% - 6px);
    width: 12px;
    height: 100%;
    background: linear-gradient(180deg, var(--ct-naranja) 0%, var(--ct-azul) 100%);
    clip-path: polygon(100% 0, 100% 0, 100% 100%, 0 100%, 8% 0);
    opacity: .85;
  }
  /* Glow naranja difuso en panel derecho */
  .ct-bg--3::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    bottom: -60px;
    right: -60px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,0,.10), rgba(255,107,0,0) 65%);
    pointer-events: none;
  }
</style>
<div class="ct-bg ct-bg--3">
  <div class="ct-bg--3__panel"></div>
  <div class="ct-bg--3__dots"></div>
  <div class="ct-bg--3__accent"></div>
  <!-- CONTENIDO DE LA PIEZA AQUÍ -->
</div>
