<!DOCTYPE html>
<!--
╔══════════════════════════════════════════════════════════════════╗
║  CHILAQUILES TOP — ct-post-texto.html                           ║
║  Post Instagram 1:1 · 1080×1080px                               ║
║  Uso: avisos, frases, instrucciones, coberturas (sin foto)      ║
║  Layout fijo: Header H2 · BG1 · Footer F3                       ║
╠══════════════════════════════════════════════════════════════════╣
║  VARIABLES:                                                      ║
║  {{LOGO_WORD_AZUL}}  URL logo azul horizontal                   ║
║  {{BADGE_TEXT}}      Badge (omitir div si no aplica)            ║
║  {{HEADLINE}}        Texto principal — elegir clase:            ║
║                      ct-hl--xl < 20c → 96px                    ║
║                      ct-hl--lg 20-45c → 72px                   ║
║                      ct-hl--md 45-80c → 54px                   ║
║                      ct-hl--sm > 80c → 42px                    ║
║                      Naranja: <span class="a">texto</span>      ║
║                      Salto: <br>                                 ║
║  {{BODY_TEXT}}       Texto apoyo (omitir div si no aplica)      ║
║  {{CTA_TEXT}}        CTA (omitir div si no aplica)              ║
╚══════════════════════════════════════════════════════════════════╝
-->
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=block" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;background:#fff;}
.canvas{position:relative;width:1080px;height:1080px;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  background-color:#FAFAFF;background-image:radial-gradient(#E5E6FC 2.2px,transparent 2.2px);
  background-size:30px 30px;}
.g1{position:absolute;width:700px;height:700px;top:-160px;left:-160px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,0,255,.11),rgba(0,0,255,0) 65%);}
.g2{position:absolute;width:640px;height:640px;bottom:-130px;right:-130px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,107,0,.13),rgba(255,107,0,0) 65%);}
.wm{position:absolute;bottom:-60px;right:-60px;font-family:'Poppins',sans-serif;
  font-weight:900;font-size:420px;line-height:1;color:#0000FF;opacity:.03;pointer-events:none;}
.header{position:relative;z-index:3;width:100%;height:122px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;padding:0 44px;
  background:#FAFAFF;border-bottom:4px solid #FF6B00;font-family:'Poppins',sans-serif;}
.hlogo{height:76px;width:auto;}
.hbadge{display:inline-flex;align-items:center;background:#FF6B00;color:#fff;
  font-weight:700;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;
  padding:9px 22px;border-radius:999px;box-shadow:0 8px 22px rgba(255,107,0,.32);}
.body{position:relative;z-index:2;flex:1;width:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 70px;gap:24px;}
.ct-hl{font-family:'Poppins',sans-serif;font-weight:900;line-height:1.05;
  color:#0000FF;text-align:center;letter-spacing:-.5px;
  -webkit-text-stroke:2px currentColor;paint-order:stroke fill;}
.ct-hl--xl{font-size:112px;} .ct-hl--lg{font-size:86px;}
.ct-hl--md{font-size:64px;} .ct-hl--sm{font-size:50px;}
.a{color:#FF6B00;}
.divider{width:80px;height:4px;border-radius:999px;background:linear-gradient(90deg,#FF6B00,#0000FF);}
.body-t{font-family:'Poppins',sans-serif;font-weight:500;font-size:36px;
  color:#0B0B12;text-align:center;line-height:1.5;max-width:820px;}
.cta{display:inline-flex;align-items:center;gap:14px;background:#FF6B00;color:#fff;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:28px;
  padding:16px 40px;border-radius:999px;box-shadow:0 8px 22px rgba(255,107,0,.32);white-space:nowrap;}
.footer{position:relative;z-index:4;width:100%;height:104px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;padding:0 50px;
  background:#fff;border-top:4px solid #FF6B00;font-family:'Poppins',sans-serif;}
.fi{display:flex;align-items:center;gap:11px;color:#0B0B12;font-weight:600;font-size:22px;white-space:nowrap;}
.ftag{font-weight:700;font-size:20px;color:#0000FF;letter-spacing:.5px;}
</style></head><body>
<div class="canvas">
  <div class="g1"></div><div class="g2"></div><div class="wm">TOP</div>
  <header class="header">
    <img class="hlogo" src="{{LOGO_WORD_AZUL}}" alt="Chilaquiles TOP"/>
    <div class="hbadge">{{BADGE_TEXT}}</div>
  </header>
  <main class="body">
    <div class="ct-hl ct-hl--lg">{{HEADLINE}}</div>
    <div class="divider"></div>
    <div class="body-t">{{BODY_TEXT}}</div>
    <div class="cta">{{CTA_TEXT}}</div>
  </main>
  <footer class="footer">
    <div class="fi"><svg width="28" height="28" viewBox="0 0 32 32" fill="#0000FF"><path d="M16 .4C7.4.4.5 7.3.5 15.9c0 2.8.7 5.4 2 7.8L.4 31.6l8.1-2.1c2.3 1.2 4.8 1.9 7.5 1.9 8.6 0 15.5-7 15.5-15.5C31.5 7.3 24.6.4 16 .4zm7.1 18.9c-.4-.2-2.3-1.1-2.6-1.3-.3-.1-.6-.2-.9.2-.3.4-1 1.3-1.2 1.5-.2.2-.4.3-.8.1-.4-.2-1.6-.6-3.1-1.9-1.1-1-1.9-2.3-2.2-2.7-.2-.4 0-.6.2-.8.2-.2.4-.4.5-.7.2-.2.2-.4.4-.7.1-.3.1-.5 0-.7-.1-.2-.9-2.2-1.3-3-.3-.8-.7-.7-.9-.7h-.8c-.3 0-.7.1-1.1.5-.4.4-1.4 1.4-1.4 3.4s1.5 3.9 1.7 4.2c.2.3 2.9 4.5 7.1 6.3 1 .4 1.8.7 2.4.9 1 .3 1.9.3 2.6.2.8-.1 2.3-1 2.7-1.9.3-.9.3-1.7.2-1.9-.1-.2-.4-.3-.8-.5z"/></svg>+502 3301-9938</div>
    <div class="ftag">#MantenteTOP</div>
    <div class="fi"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0000FF" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>chilaquilestop.com</div>
  </footer>
</div></body></html>
