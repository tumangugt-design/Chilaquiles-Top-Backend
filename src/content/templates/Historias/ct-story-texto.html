<!DOCTYPE html>
<!--
╔══════════════════════════════════════════════════════════════════╗
║  CHILAQUILES TOP — ct-story-texto.html                          ║
║  Story Instagram 9:16 · 1080x1920px                             ║
║  Uso: frases, avisos, coberturas, valores de marca (sin foto)   ║
║  Sin barras de header/footer — diseño nativo para Stories       ║
║                                                                  ║
║  SAFE ZONE Instagram Stories 2026:                              ║
║    Top 250px · Bottom 250px · Lados 65px                        ║
║    Logo: top=290px (dentro safe zone)                           ║
║    Bottom info: bottom=265px (dentro safe zone)                 ║
╠══════════════════════════════════════════════════════════════════╣
║  TIPOGRAFÍA HEADLINE:                                           ║
║    Poppins Black (font-weight:900) — sin stroke                 ║
║    = letras gordas y redondeadas (sin fuente externa)           ║
╠══════════════════════════════════════════════════════════════════╣
║  VARIABLES:                                                      ║
║  {{LOGO_WORD_AZUL}}  URL logo azul horizontal                   ║
║  {{BADGE_TEXT}}      Badge naranja (omitir div si no aplica)    ║
║  {{HEADLINE}}        Texto principal — elegir clase:            ║
║                      ct-hl--xl < 15c → 170px                   ║
║                      ct-hl--lg 15-35c → 130px                  ║
║                      ct-hl--md 35-60c → 100px                  ║
║                      ct-hl--sm > 60c → 76px                    ║
║                      Naranja: <span class="a">texto</span>      ║
║                      Salto de línea: <br>                       ║
║  {{BODY_TEXT}}       Texto apoyo (omitir div si no aplica)      ║
║  {{CTA_TEXT}}        CTA (omitir div si no aplica)              ║
╚══════════════════════════════════════════════════════════════════╝
-->
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:#FAFAFF;}
.canvas{position:relative;width:1080px;height:1920px;overflow:hidden;
  background-color:#FAFAFF;
  background-image:radial-gradient(#E5E6FC 2.2px,transparent 2.2px);
  background-size:30px 30px;}
.g1{position:absolute;width:1000px;height:1000px;top:-260px;left:-260px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,0,255,.13),rgba(0,0,255,0) 62%);pointer-events:none;}
.g2{position:absolute;width:900px;height:900px;bottom:-100px;right:-200px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,107,0,.15),rgba(255,107,0,0) 62%);pointer-events:none;}
/* LOGO — top 290px, dentro safe zone (>250px) */
.logo-wrap{position:absolute;top:290px;left:50%;transform:translateX(-50%);
  z-index:4;display:flex;flex-direction:column;align-items:center;gap:16px;}
.logo{height:100px;width:auto;}
.badge{display:inline-flex;align-items:center;gap:8px;background:#FF6B00;color:#fff;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:22px;letter-spacing:1.5px;
  text-transform:uppercase;padding:9px 24px;border-radius:999px;
  box-shadow:0 8px 22px rgba(255,107,0,.32);}
.bdot{width:10px;height:10px;border-radius:50%;background:#fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.25);flex-shrink:0;}
/* BLOQUE CENTRAL — centrado en safe area (y=250 a y=1670, centro y=960) */
.center{position:absolute;top:960px;left:50%;transform:translate(-50%,-50%);
  width:950px;display:flex;flex-direction:column;align-items:center;z-index:2;}
/* HEADLINE — Poppins Black + stroke = letras gordas */
.ct-hl{font-family:'Poppins',sans-serif;font-weight:900;text-align:center;
  line-height:1.05;letter-spacing:1px;color:#0000FF;
  -webkit-text-stroke:2px currentColor;paint-order:stroke fill;}
.ct-hl--xl{font-size:196px;} .ct-hl--lg{font-size:150px;}
.ct-hl--md{font-size:116px;} .ct-hl--sm{font-size:88px;}
.a{color:#FF6B00;}
.divider{width:90px;height:5px;border-radius:999px;
  background:linear-gradient(90deg,#FF6B00,#0000FF);margin:46px auto 42px;}
.body-t{font-family:'Poppins',sans-serif;font-weight:500;font-size:44px;
  color:#0B0B12;text-align:center;line-height:1.55;}
.cta{margin-top:44px;display:inline-flex;align-items:center;gap:12px;
  background:#FF6B00;color:#fff;font-family:'Poppins',sans-serif;
  font-weight:700;font-size:40px;padding:22px 52px;border-radius:999px;
  box-shadow:0 8px 22px rgba(255,107,0,.32);white-space:nowrap;}
/* INFO BOTTOM — bottom 265px, dentro safe zone (<1670px) */
.bottom{position:absolute;bottom:265px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:12px;z-index:4;}
.hashtag{font-family:'Poppins',sans-serif;font-weight:700;font-size:42px;
  color:#0000FF;letter-spacing:1px;}
.web{font-family:'Poppins',sans-serif;font-weight:400;font-size:33px;
  color:#0B0B12;opacity:.45;}
</style></head><body>
<div class="canvas">
  <div class="g1"></div><div class="g2"></div>
  <!-- LOGO — flotante, sin barra -->
  <div class="logo-wrap">
    <img class="logo" src="{{LOGO_WORD_AZUL}}" alt="Chilaquiles TOP"/>
    <!-- Omitir si {{BADGE_TEXT}} no aplica -->
    <div class="badge"><span class="bdot"></span>{{BADGE_TEXT}}</div>
  </div>
  <!-- BLOQUE CENTRAL -->
  <div class="center">
    <!--
      Seleccionar clase según longitud del {{HEADLINE}}:
        ct-hl--xl < 15c → 170px | ct-hl--lg 15-35c → 130px
        ct-hl--md 35-60c → 100px | ct-hl--sm > 60c → 76px
      Naranja: <span class="a">palabra</span>
      Salto: <br>
    -->
    <div class="ct-hl ct-hl--lg">{{HEADLINE}}</div>
    <div class="divider"></div>
    <!-- Omitir si no aplica -->
    <div class="body-t">{{BODY_TEXT}}</div>
    <div class="cta">{{CTA_TEXT}}</div>
  </div>
  <!-- INFO BOTTOM — flotante, sin barra -->
  <div class="bottom">
    <div class="hashtag">#MantenteTOP</div>
    <div class="web">chilaquilestop.com</div>
  </div>
</div>
</body></html>
