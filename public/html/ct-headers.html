<!--
  CHILAQUILES TOP — Header Components v2
  ========================================
  Variables de imagen (el modelo sustituye con URLs de GitHub):
    {{LOGO_WORD_BLANCO}}   → Wordmark horizontal BLANCO  (para fondos de color)
    {{LOGO_WORD_AZUL}}     → Wordmark horizontal AZUL    (para fondos claros/blancos)
    {{LOGO_CUADRADO_AZUL}} → Wordmark cuadrado AZUL      (para espacios compactos)

  Variable de texto:
    {{BADGE_TEXT}} → Texto del eyebrow/badge, ej: "Nueva cobertura · Zona 6"

  Los footers y hashtag son fijos (datos constantes de marca).
-->


<!-- ============================================================
     HEADER 1 — "Azul Completo"
     Fondo: azul sólido con gradiente interno y glow.
     Logo: WORDMARK BLANCO centrado.
     Badge: píldora naranja con punto "live" + {{BADGE_TEXT}}.
     Altura en canvas 1080px: 260–300px.
     ============================================================ -->
<style>
  .ct-header--1 {
    position: relative;
    width: 100%;
    height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: linear-gradient(135deg, var(--ct-azul) 0%, var(--ct-azul2) 55%, #5B3BFF 100%);
    border-radius: 0 0 54px 54px;
    box-shadow: var(--ct-sh-azul);
    overflow: hidden;
    font-family: var(--ct-font);
  }
  .ct-header--1__glow {
    position: absolute;
    width: 460px; height: 460px;
    top: -230px; left: 50%;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.16), transparent 60%);
    pointer-events: none;
  }
  .ct-header--1__logo {
    position: relative;
    width: 300px;
    height: auto;
  }
  .ct-header--1__badge {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ct-naranja);
    color: var(--ct-blanco);
    font-family: var(--ct-font);
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    padding: 9px 22px;
    border-radius: var(--ct-r-pill);
    box-shadow: var(--ct-sh-nrj);
  }
  .ct-header--1__dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ct-blanco);
    box-shadow: 0 0 0 4px rgba(255,255,255,.25);
    flex-shrink: 0;
  }
</style>
<header class="ct-header ct-header--1">
  <div class="ct-header--1__glow"></div>
  <img class="ct-header--1__logo"
       src="{{LOGO_WORD_BLANCO}}"
       alt="Chilaquiles TOP" />
  <div class="ct-header--1__badge">
    <span class="ct-header--1__dot"></span>
    {{BADGE_TEXT}}
  </div>
</header>


<!-- ============================================================
     HEADER 2 — "Minimal Blanco"
     Fondo: blanco/gris muy suave.
     Logo: WORDMARK AZUL alineado a la izquierda.
     Badge: píldora naranja a la derecha.
     Borde inferior: línea naranja 4px.
     Altura en canvas 1080px: 110–130px.
     ============================================================ -->
<style>
  .ct-header--2 {
    width: 100%;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 44px;
    background: var(--ct-gris-bg);
    border-bottom: 4px solid var(--ct-naranja);
    font-family: var(--ct-font);
    box-sizing: border-box;
  }
  .ct-header--2__logo {
    height: 52px;
    width: auto;
  }
  .ct-header--2__badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ct-naranja);
    color: var(--ct-blanco);
    font-family: var(--ct-font);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 9px 22px;
    border-radius: var(--ct-r-pill);
    box-shadow: var(--ct-sh-nrj);
  }
</style>
<header class="ct-header ct-header--2">
  <img class="ct-header--2__logo"
       src="{{LOGO_WORD_AZUL}}"
       alt="Chilaquiles TOP" />
  <div class="ct-header--2__badge">{{BADGE_TEXT}}</div>
</header>


<!-- ============================================================
     HEADER 3 — "Faja Degradé"
     Fondo: blanco con barra superior gradiente naranja→azul (8px).
     Logo: WORDMARK AZUL CUADRADO centrado.
     Línea de acento azul→naranja debajo del logo.
     Puntos de textura lavanda en esquina derecha.
     Sin badge (el badge va en el body de la pieza).
     Altura en canvas 1080px: 150–175px.
     ============================================================ -->
<style>
  .ct-header--3 {
    position: relative;
    width: 100%;
    height: 162px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--ct-blanco);
    overflow: hidden;
    font-family: var(--ct-font);
  }
  .ct-header--3__bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 8px;
    background: linear-gradient(90deg, var(--ct-naranja), var(--ct-azul));
  }
  .ct-header--3__dots {
    position: absolute;
    right: -20px; top: 8px;
    width: 190px; height: 162px;
    opacity: .30;
    background-image: radial-gradient(var(--ct-lavanda) 2.5px, transparent 2.5px);
    background-size: 22px 22px;
    pointer-events: none;
  }
  .ct-header--3__logo {
    position: relative;
    height: 78px;
    width: auto;
    margin-top: 8px;
  }
  .ct-header--3__line {
    position: relative;
    width: 64px; height: 3px;
    background: linear-gradient(90deg, var(--ct-azul), var(--ct-naranja));
    border-radius: var(--ct-r-pill);
    margin-top: 10px;
  }
</style>
<header class="ct-header ct-header--3">
  <div class="ct-header--3__bar"></div>
  <div class="ct-header--3__dots"></div>
  <img class="ct-header--3__logo"
       src="{{LOGO_CUADRADO_AZUL}}"
       alt="Chilaquiles TOP" />
  <div class="ct-header--3__line"></div>
</header>
